<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register page</title>
    <link rel="stylesheet" href="../css_styles/register.css">
    <link rel="shortcut icon" href="../asset/icon.jpg" type="image/x-icon">
</head>

<body>
    <div class="register-container">
        <header class="register-header">
            <h1>Create New Account</h1>
            <p>Join the fight against corruption. Your identity remains protected.</p>
            <a href="../index.html" class="back-sticker">⬅️</a>
        </header>

        <form class="register-body" id="register-form">

            <div class="register-section">
                <h2>Personal Information</h2>
                <div class="register-row">
                    <div class="register-group">
                        <label for="first_name">First Name <span class="required">*</span></label>
                        <input type="text" id="first_name" name="first_name" required>
                    </div>
                    <div class="register-group">
                        <label for="last_name">Last Name <span class="required">*</span></label>
                        <input type="text" id="last_name" name="last_name" required>
                    </div>
                </div>
                <div class="register-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="register-group">
                    <label for="user_name">User Name<span class="required">*</span></label>
                    <input type="text" id="user_name" name="user_name" required>
                </div>
                <div class="register-group">
                    <label for="password">Password<span class="required">*</span></label>
                    <div class="password-container">
                        <input type="password" id="password" name="password" required>
                        <span id="togglePassword" class="password-toggle">👁️</span>
                    </div>
                </div>
                <div class="register-group">
                    <label for="phone_number">Phone Number<span class="required">*</span></label>
                    <input type="tel" id="phone_number" name="phone_number" required>
                </div>
            </div>

            <hr>

            <div class="register-section">
                <h2>Location Information</h2>
                <div class="register-row">
                    <div class="register-group">
                        <label for="state">State <span class="required">*</span></label>
                        <input type="text" id="state" name="state" required>
                    </div>
                    <div class="register-group">
                        <label for="district">District <span class="required">*</span></label>
                        <input type="text" id="district" name="district" required>
                    </div>
                </div>
                <div class="register-group">
                    <label for="village_town">Village/Town</label>
                    <input type="text" id="village_town" name="village_town">
                </div>
                <label class="drop" for="user_role">User Role</label>
                <select name="user_role" id="user_role" class="select">
                    <option value="user">people</option>
                    <option value="collector">Collector</option>
                </select>

            </div>

            <hr>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Privacy Policy and Terms of Service</label>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>

            <p class="login-link">
                Already have an account? <a href="./login.html">login</a>
            </p>

        </form>

        <div id="register-message" style="margin-top:10px;color:green"></div>

        <script src="../javascript/register.js"></script>
    </div>

</body>

</html>
