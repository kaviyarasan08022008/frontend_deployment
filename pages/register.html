<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Register page</title>
    <link rel="stylesheet" href="../css_styles/register.css">
    <link rel="shortcut icon" href="../asset/icon.jpg" type="image/x-icon">
</head>

<body>
    <div class="register-container">
        <header class="register-header">
            <h1>Create New Account</h1>
            <p>Join the fight against corruption. Your identity remains protected.</p>
            <div class="back-sticker" onclick="history.back()">⬅️</div>
        </header>

        <form class="register-body" id="register-form">

            <div class="register-section">
                <h2>Personal Information</h2>
                <div class="register-row">
                    <div class="register-group">
                        <label for="first_name">First Name <span class="required">*</span></label>
                        <input type="text" id="first_name" name="first_name" required>
                    </div>
                    <div class="register-group">
                        <label for="last_name">Last Name <span class="required">*</span></label>
                        <input type="text" id="last_name" name="last_name" required>
                    </div>
                </div>
                <div class="register-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="register-group">
                    <label for="user_name">User Name<span class="required">*</span></label>
                    <input type="text" id="user_name" name="user_name" required>
                </div>
                <div class="register-group">
                    <label for="password">Password<span class="required">*</span></label>
                    <input type="password" id="password" name="password" required>
                </div>
            </div>

            <hr>

            <div class="register-section">
                <h2>Location Information</h2>
                <div class="register-row">
                    <div class="register-group">
                        <label for="state">State <span class="required">*</span></label>
                        <input type="text" id="state" name="state" required>
                    </div>
                    <div class="register-group">
                        <label for="district">District <span class="required">*</span></label>
                        <input type="text" id="district" name="district" required>
                    </div>
                </div>
                <div class="register-group">
                    <label for="village_town">Village/Town</label>
                    <input type="text" id="village_town" name="village_town">
                </div>
                     <label class="drop" for="user_role">User Role</label>
                         <select name="user_role" id="user_role" class="select">
                             <option value="user">people</option>
                             <option value="collector">Collector</option>
                    </select>
              
            </div>

            <hr>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Privacy Policy and Terms of Service</label>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>

            <p class="login-link">
                Already have an account? <a href="./login.html">login</a>
            </p>

        </form>

        <div id="register-message" style="margin-top:10px;color:green"></div>

        <script>
        // Simple register form handler
        document.getElementById('register-form').addEventListener('submit', async function(e){
            e.preventDefault();
            const form = e.target;
            const payload = {
                first_name: form.first_name.value,
                last_name: form.last_name.value,
                email: form.email.value,
                user_name: form.user_name.value,
                password: form.password.value,
                state: form.state.value,
                district: form.district.value,
                village_town: form.village_town.value,
                user_role: form.user_role.value
            };

            try{
                const res = await fetch('https://backend-deployment-elh1.onrender.com/users/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok){
                    const data = await res.json();
                    // persist a simple client-side "logged in" id for demo flows
                    localStorage.setItem('user_id', String(data.id));
                    localStorage.setItem('user_name', data.user_name || data.first_name || '');
                    alert('✅Account created (id: ' + data.id + '). Your id has been saved locally.')
                    form.reset();
                } else {
                    const err = await res.json();
                    document.getElementById('register-message').style.color = 'red';
                    alert('❌ Error: ' + (err.detail || JSON.stringify(err)))
                }
            } catch (e) {
                document.getElementById('register-message').style.color = 'red';
                document.getElementById('register-message').textContent = 'Network error: ' + e.message;
            }
        });
        </script>
    </div>

</body>

</html>
