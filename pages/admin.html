<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collector Admin Panel</title>
  <link rel="stylesheet" href="../css_styles/admin.css">
  <link rel="shortcut icon" href="../asset/icon.jpg" type="image/x-icon">
</head>

<body>
  <header>
    <img id="admin-logo" src="../asset/village voice logo.png" alt="Village Voice Logo">
    <h1 class="tag">VILLAGE VOICE | Collector Admin Panel</h1>
    <a href="./login.html" class="button">Logout</a>
    <a href="../index.html" class="back-sticker">⬅️</a>
  </header>

  <section class="dashboard" id="admin-dashboard">
    <h2>Admin Summary (Dashboard)</h2>

    <div class="summary-cards">
      <div class="card blue">
        <h3>Total Complaints</h3>
        <p id="total-count">0</p>
      </div>
      <div class="card orange">
        <h3>New / Pending</h3>
        <p id="pending-count">0</p>
      </div>
      <div class="card green">
        <h3>Resolved Complaints</h3>
        <p id="solved-count">0</p>
      </div>
    </div>

    <h3 class="new">New and Pending Complaints</h3>

    <table>
      <thead>
        <tr>
          <th>COMPLAINT ID</th>
          <th>GRIEVANCE TITLE</th>
          <th>VILLAGE</th>
          <th>DATE FILED</th>
          <th>EVIDENCE</th>
          <th>CURRENT STATUS</th>
        </tr>
      </thead>
      <tbody id="complaintsTableBody">
      </tbody>
    </table>
    
  </section>
  <script src="../javascript/config.js"></script>
  <script src="../javascript/admin.js"></script>
</body>

</html>
