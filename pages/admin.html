<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collector Admin Panel</title>
  <link rel="stylesheet" href="../css_styles/admin.css">
  <link rel="shortcut icon" href="../asset/icon.jpg" type="image/x-icon">
</head>

<body>
  <header>
    <img id="admin-logo" src="../asset/village voice logo.png" alt="Village Voice Logo">
    <h1 class="tag">VILLAGE VOICE | Collector Admin Panel</h1>
    <a href="./login.html" class="button">Logout</a>
    <div class="back-sticker" onclick="history.back()">⬅️</div>
  </header>

  <section class="dashboard">
    <h2>Admin Summary (Dashboard)</h2>

    <div class="summary-cards">
      <div class="card blue">
        <h3>Total Complaints</h3>
        <p>145</p>
      </div>
      <div class="card orange">
        <h3>New / Pending</h3>
        <p>42</p>
      </div>
      <div class="card green">
        <h3>Resolved Complaints</h3>
        <p>103</p>
      </div>
    </div>

    <h3 class="new">New and Pending Complaints</h3>

    <table>
      <thead>
        <tr>
          <th>COMPLAINT ID</th>
          <th>GRIEVANCE TITLE</th>
          <th>VILLAGE</th>
          <th>DATE FILED</th>
          <th>EVIDENCE</th>
          <th>CURRENT STATUS</th>
        </tr>
      </thead>
      <tbody id="complaintsTableBody">
      </tbody>
    </table>
  </section>
  <script>
    async function loadComplaints() {
      try {
        const res = await fetch("https://backend-deployment-elh1.onrender.com/complaints",{cache:"no-store"});
        const data = await res.json();

        const tableBody = document.getElementById("complaintsTableBody");
        tableBody.innerHTML = ""; // clear old rows

        data.forEach(complaint => {
          const row = document.createElement("tr");

          // Evidence Link logic
          const evidenceHtml = complaint.image_url
            ? `<a href="${complaint.image_url}" target="_blank" style="color:blue;text-decoration:underline">View Evidence</a>`
            : "No File";
            
            row.innerHTML = `
        <td>RPT${complaint.id}</td>
        <td>${complaint.category}</td>
        <td>${complaint.village}</td>
        <td>${complaint.incident_date}</td>
        <td>${evidenceHtml}</td>
        <td>
          <select id="status-${complaint.id}">
            <option value="not-approved">Not Approved</option>
            <option value="pending">Pending</option>
            <option value="solved">Solved</option>
          </select>
          <button class="ed-but" onclick="updateComplaint(${complaint.id})">Update</button>
          <button class="del-but" onclick="deleteComplaint(${complaint.id})">Delete</button>
        </td>
      `;

          tableBody.appendChild(row);
        });

      } catch (error) {
        alert("❌ Failed to load complaints");
        console.error(error);
      }
    }

    async function updateComplaint(id) {
      const statusSelect = document.getElementById(`status-${id}`);
      const status = statusSelect.value;

      const formData = new FormData();
      formData.append("status", status);

      try {
        const res = await fetch(`https://backend-deployment-elh1.onrender.com/complaints/${id}/status`, {
          method: 'PATCH',
          body: formData
        });

        if (res.ok) {
          alert(`✅ Complaint ${id} updated to ${status}`);
          loadComplaints(); // reload to reflect changes
        } else {
          alert("❌ Update Failed");
        }
      } catch (error) {
        console.error(error);
        alert("❌ Error Updating");
      }
    }

    async function deleteComplaint(id) {
      if (!confirm("Are you sure you want to delete this complaint?")) return;

      try {
        const res = await fetch(`https://backend-deployment-elh1.onrender.com/complaints/${id}`, {
          method: 'DELETE'
        });

        if (res.ok) {
          alert("✅ Complaint Deleted");
          loadComplaints(); // reload list
        } else {
          alert("❌ Delete Failed");
        }
      } catch (error) {
        console.error(error);
        alert("❌ Error Deleting");
      }
    }

    // load data when page opens
    loadComplaints();
  </script>
</body>

</html>
