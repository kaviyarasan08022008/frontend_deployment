<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Complaints Page</title>
  <link rel="stylesheet" href="../css_styles/filecomplaint.css">
  <link rel="shortcut icon" href="../asset/icon.jpg" type="image/x-icon">
</head>

<body>

  <div class="container">
    <div class="header">
      <h2>File Corruption Complaint</h2>
      <p>All information is encrypted and secure. Your identity is protected.</p>
    </div>

    <form class="complaint-body" id="complaint-form">
      <label>Corruption Category <span>*</span></label>
      <select name="category" required>
        <option value="corruption">Corruption / Bribery (லஞ்ச ஊழல்)</option>
        <option value="Road">Road Problems (சாலை பிரச்சனை)</option>
        <option value="Water">Water Supply Issues (தண்ணீர் விநியோகம் பிரச்சனை)</option>
        <option value="Electricity">Electricity Issues (மின்சாரம் பிரச்சனை)</option>
        <option value="Drainage">Drainage / Sanitation (கழிவுநீர் / சுகாதாரம்)</option>
        <option value="Ration">Ration / PDS Corruption (ரேஷன் ஊழல்)</option>
        <option value="School">School / Education Problems (பள்ளி / கல்வி பிரச்சனை)</option>
        <option value="Health">Health / Hospital Issues (மருத்துவம் / ஆரோக்கிய பிரச்சனை)</option>
        <option value="Agriculture">Agriculture Problems (விவசாய பிரச்சனை)</option>
        <option value="Land">Land / Property Disputes (நிலம் / சொத்து பிரச்சனை)</option>
        <option value="Waste">Waste Management (குப்பை நிர்வாகம்)</option>
        <option value="Women">Women Safety / Harassment (பெண்கள் பாதுகாப்பு / தொந்தரவு)</option>
        <option value="Police">Police / Law Issues (காவல் துறை / சட்ட பிரச்சனை)</option>
        <option value="Panchayat">Panchayat Misuse / Funds (பஞ்சாயத்து நிதி மோசடி)</option>
        <option value="Public">Public Transport Issues (பொதுப் போக்குவரத்து பிரச்சனை)</option>
      </select>

      <div class="row">

        <div> <label>Officer / Official Name <span>*</span></label>
          <input type="text" name="officer_name" placeholder="Officer name" required>
        </div>

        <div> <label>Designation / Position <span>*</span></label>
          <input type="text" name="designation" placeholder="Position" required>
        </div>
      </div>

      <div class="row">
        <div> <label>Village / Location <span>*</span></label>
          <input type="text" name="village" placeholder="Village" required>
        </div>


        <div> <label>District <span>*</span></label>
          <input type="text" name="district" placeholder="District" required>
        </div>


        <div> <label>collector ID <span>*</span></label>
          <input type="text" name="collector_id" placeholder="collector ID" required>
        </div>


      </div>
      <label>Incident Date <span>*</span></label>
      <input type="date" name="incident_date" required>

      <label>Detail Description of Corruption <span>*</span></label>
      <textarea name="description" required></textarea>

      <label for="file">Upload Evidence File:</label><br><br>
      <input type="file" name="evidence" accept=".jpg,.png,.pdf,.mp4">

      <div class="anon"> <input type="checkbox" name="is_anonymous" value="true">
        <label for="is_anonymous" class="submit">Submit Anonymously</label>
      </div>


      <div class="contact-info">
        <label>Contact Information (optional)</label>
        <input type="text" name="contact_name" placeholder="Your Name (optional)">


        <div class="row">
          <input type="text" name="contact_phone" placeholder="Phone Number">
          <input type="email" name="contact_email" placeholder="Email">
        </div>


      </div> <button type="submit" class="file">Submit Complaint Securely</button>

      <script>

        document.getElementById("complaint-form").addEventListener("submit", async function (e) {
          e.preventDefault();

          const form = document.getElementById("complaint-form");
          const formData = new FormData(form);

          // Add people_id (you may need to get this from logged-in user)
          const people_id = localStorage.getItem("user_id") || 1;
          formData.append("people_id", people_id);

          // Convert checkbox value to boolean
          const is_anonymous = formData.get("is_anonymous") === "true";
          formData.set("is_anonymous", is_anonymous);

          try {
            const response = await fetch("https://backend-deployment-elh1.onrender.com/complaints/", {
              method: "POST",
              body: formData
            });

            const result = await response.json();

            if (response.ok) {
              alert(`✅ Complaint submitted successfully!\n\nYour Complaint ID: RPT${result.id}\n\nPlease save this ID to track your complaint status.`);
              form.reset();
            } else {
              // Handle both validation errors and string errors
              let msg = "Unknown Error";
              if (result.detail) {
                msg = Array.isArray(result.detail) ? result.detail[0].msg : result.detail;
              }
              alert("❌ Error: " + msg);
            }

          } catch (error) {
            console.error("Error:", error);
            alert("❌ Server connection failed");
          }
        });
      </script>

</body>

</html>
