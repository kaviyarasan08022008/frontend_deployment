<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Complaints Page</title>
  <link rel="stylesheet" href="../css_styles/filecomplaint.css">
  <link rel="shortcut icon" href="../asset/icon.jpg" type="image/x-icon">
</head>

<body>

  <div class="container">
    <div class="header">
      <h2>File Corruption Complaint</h2>
      <p>All information is encrypted and secure. Your identity is protected.</p>
      <a href="../index.html" class="back-sticker">⬅️</a>
    </div>

    <form class="complaint-body" id="complaint-form">
      <label>Corruption Category <span>*</span></label>
      <select name="category" required>
        <option value="corruption">Corruption / Bribery (லஞ்ச ஊழல்)</option>
        <option value="VAO">Village Administrative Officer (VAO) Bribery (கிராம நிர்வாக அதிகாரி லஞ்சம்)</option>
        <option value="PanchayatClerk">Panchayat Clerk Bribery (பஞ்சாயத்து எழுத்தர் லஞ்சம்)</option>
        <option value="EB">Electricity Board Bribe for Connection (மின்சார இணைப்பு லஞ்சம்)</option>
        <option value="WaterDept">Water Supply Officer Bribe (தண்ணீர் விநியோகம் லஞ்சம்)</option>
        <option value="Revenue">Revenue Department Land Record Bribe (வருவாய் துறை நில ஆவண லஞ்சம்)</option>
        <option value="RationOfficer">Ration Shop Officer Corruption (ரேஷன் கடை ஊழல்)</option>
        <option value="PoliceBribe">Police Bribery for Complaint (காவல் துறை லஞ்சம்)</option>
        <option value="HealthInspector">Health Inspector Bribe (சுகாதார ஆய்வாளர் லஞ்சம்)</option>
        <option value="SchoolAdmin">Government School Admission Bribe (அரசுப் பள்ளி சேர்க்கை லஞ்சம்)</option>
        <option value="AgricultureOfficer">Agriculture Subsidy Bribe (விவசாய மானியம் லஞ்சம்)</option>
        <option value="HousingScheme">Housing Scheme Fund Misuse (வீட்டு திட்ட நிதி மோசடி)</option>
        <option value="MGNREGA">MGNREGA Wage Corruption (மகாத்மா காந்தி வேலைத் திட்ட ஊழல்)</option>
        <option value="RoadContract">Road Contract Fund Misuse (சாலை ஒப்பந்த நிதி மோசடி)</option>
        <option value="OldAgePension">Old Age Pension Bribe (முதியோர் ஓய்வூதியம் லஞ்சம்)</option>
        <option value="BirthCertificate">Birth/Death Certificate Bribe (பிறப்பு / இறப்பு சான்றிதழ் லஞ்சம்)</option>
      </select>

      <div class="row">

        <div> <label>Officer / Official Name <span>*</span></label>
          <input type="text" name="officer_name" placeholder="Officer name" required>
        </div>

        <div> <label>Designation / Position <span>*</span></label>
          <input type="text" name="designation" placeholder="Position" required>
        </div>
      </div>

      <div class="row">
        <div> <label>Village / Location <span>*</span></label>
          <input type="text" name="village" placeholder="Village" required>
        </div>


        <div> <label>District <span>*</span></label>
          <input type="text" name="district" placeholder="District" required>
        </div>


        <div> <label>collector ID <span>*</span></label>
          <input type="text" name="collector_id" placeholder="collector ID" required>
        </div>


      </div>
      <label>Incident Date <span>*</span></label>
      <input type="date" name="incident_date" required>

      <label>Detail Description of Corruption <span>*</span></label>
      <textarea name="description" required></textarea>

      <label for="file">Upload Evidence File:</label><br><br>
      <input type="file" name="evidence" accept=".jpg,.png,.pdf,.mp4">

      <div class="anon"> <input type="checkbox" name="is_anonymous" value="true">
        <label for="is_anonymous" class="submit">Submit Anonymously</label>
      </div>


      <div class="contact-info">
        <label>Contact Information (optional)</label>
        <input type="text" name="contact_name" placeholder="Your Name (optional)">


        <div class="row">
          <input type="text" name="contact_phone" placeholder="Phone Number">
          <input type="email" name="contact_email" placeholder="Email">
        </div>


      </div> <button type="submit" class="file">Submit Complaint Securely</button>
    </form>

    <script src="../javascript/config.js"></script>
    <script src="../javascript/filecomplaint.js"></script>
</body>

</html>
