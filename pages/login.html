<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Selection</title>
  <link rel="shortcut icon" href="../asset/icon.jpg" type="image/x-icon">
  <link rel="stylesheet" href="../css_styles/login.css">
</head>

<body>
  <div class="container">
    <h2>Select Login Type</h2>

    <div class="role-selection">
      <button id="adminBtn">Collector</button>
      <button id="userBtn">People</button>
      <div class="back-sticker" onclick="history.back()">⬅️</div>
    </div>

    <form id="loginForm" class="login-form" action="">
      <h3 id="loginTitle">Login</h3>
      <h4>Username :</h4>
      <input type="text" id="username" placeholder="Username" required />
      <h4>Password :</h4>
      <input type="password" id="password" placeholder="Password" required />
      <div class="remember">
        <a href="#">Forgot Password?</a>
      </div>
      <br>
      <button class="login-btn" id="login-btn">Login</button>
      <p class="regi">
        Don't have an account? <a href="./register.html">Register here</a>
      </p>
    </form>
  </div>

  <script>
const adminBtn = document.getElementById("adminBtn");
const userBtn = document.getElementById("userBtn");
const loginForm = document.getElementById("loginForm");
const loginTitle = document.getElementById("loginTitle");

let selectedRole = "";

adminBtn.onclick = () => {
  loginTitle.textContent = "Collector Login";
  selectedRole = "collector";
};

userBtn.onclick = () => {
  loginTitle.textContent = "People Login";
  selectedRole = "user";
};

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!selectedRole) {
    alert("Please select login type");
    return;
  }

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("https://backend-deployment-elh1.onrender.com/users/login/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        user_name: username,
        password: password,
        user_role: selectedRole
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert("❌ " + (data.detail || "Login failed"));
      return;
    }

    localStorage.setItem("user_id", data.id);
    localStorage.setItem("user_name", data.user_name);
    localStorage.setItem("user_role", data.user_role);

    window.location.href =
      data.user_role === "collector"
        ? "admin.html"
        : "filecomplaint.html";

  } catch (err) {
    alert("❌ Network error");
  }
});

  </script>
</body>

</html>
