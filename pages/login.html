<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Selection</title>
  <link rel="shortcut icon" href="../asset/icon.jpg" type="image/x-icon">
  <link rel="stylesheet" href="../css_styles/login.css">
</head>

<body>
  <div class="container">
    <h2>Select Login Type</h2>

    <div class="role-selection">
      <button id="adminBtn">Collector</button>
      <button id="userBtn">People</button>
      <a href="../index.html" class="back-sticker">⬅️</a>
    </div>

    <form id="loginForm" class="login-form" action="">
      <h3 id="loginTitle">Login</h3>
      <h4>Username :</h4>
      <input type="text" id="username" placeholder="Username" required />
      <h4>Password :</h4>
      <input type="password" id="password" placeholder="Password" required />
      <div class="remember">
        <a href="#">Forgot Password?</a>
      </div>
      <br>
      <button class="login-btn" id="login-btn">Login</button>
      <p class="regi">
        Don't have an account? <a href="register.html">Register here</a>
      </p>
    </form>
  </div>

  <script src="../javascript/login.js"></script>
</body>

</html>
